<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ───────────────────────── reset ───────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }
body { overflow: hidden; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
button { font: inherit; color: inherit; border: none; background: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
::-webkit-scrollbar { width: 11px; height: 11px; }
::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--scroll-hi); background-clip: padding-box; border: 3px solid transparent; }
::selection { background: var(--sel-strong); color: #fff; }

/* ───────────────────────── tokens · light ───────────────────────── */
:root {
  --ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Songti SC", "Source Han Serif SC", "Noto Serif SC", serif;
  --mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, monospace;

  --r-sm: 6px; --r: 9px; --r-lg: 13px; --r-xl: 17px;

  --text:   rgba(41,37,31,.90);
  --text-2: rgba(54,48,40,.60);
  --text-3: rgba(64,56,46,.40);
  --text-4: rgba(64,56,46,.24);

  --accent: #4a72bd;
  --accent-soft: rgba(74,114,189,.13);
  --accent-text: #3f68b4;
  --amber: #d2973f;
  --amber-soft: rgba(212,150,70,.20);
  --star: #d99a3c;
  --hl: rgba(245,205,120,.55);
  --hl-edge: rgba(200,150,40,.50);

  --win-bg: rgba(243,240,236,.80);
  --win-stroke: rgba(60,50,40,.16);

  --glass-side: rgba(243,240,235,.62);
  --glass-side-tint: rgba(225,210,182,.18);
  --pane: rgba(248,245,241,.76);
  --reader-bg: rgba(251,249,245,.88);

  --sep: rgba(60,50,38,.09);
  --sep-strong: rgba(60,50,38,.15);
  --hover: rgba(60,50,38,.05);
  --hover-2: rgba(60,50,38,.08);
  --sel: rgba(212,150,70,.14);
  --sel-strong: #4a72bd;
  --control: rgba(60,50,38,.055);
  --control-stroke: rgba(60,50,38,.11);
  --seg-bg: rgba(60,50,38,.07);
  --seg-knob: #fffdfb;
  --field: rgba(60,50,38,.05);
  --scroll: rgba(60,50,38,.22);
  --scroll-hi: rgba(60,50,38,.34);
  --shadow-pop: 0 14px 50px -10px rgba(40,30,20,.26), 0 4px 14px -6px rgba(40,30,20,.16);
  --blur: saturate(170%) blur(34px);
  --wallpaper:
     radial-gradient(120% 120% at 8% 4%,  oklch(0.93 0.030 80 / .95), transparent 58%),
     radial-gradient(100% 100% at 92% 16%, oklch(0.91 0.040 45 / .85), transparent 52%),
     radial-gradient(130% 120% at 72% 104%, oklch(0.91 0.032 110 / .82), transparent 60%),
     linear-gradient(155deg, oklch(0.94 0.020 75), oklch(0.90 0.028 58));
}
[data-theme="dark"] {
  --text:   rgba(244,238,228,.92);
  --text-2: rgba(232,224,210,.55);
  --text-3: rgba(225,215,198,.36);
  --text-4: rgba(225,215,198,.22);

  --accent: #7aa0d8;
  --accent-soft: rgba(122,160,216,.20);
  --accent-text: #93b3e3;
  --amber: #e0ad55;
  --amber-soft: rgba(224,173,85,.18);
  --star: #e6b257;
  --hl: rgba(235,195,110,.28);
  --hl-edge: rgba(235,195,110,.40);

  --win-bg: rgba(38,35,30,.76);
  --win-stroke: rgba(255,250,240,.10);

  --glass-side: rgba(46,42,36,.55);
  --glass-side-tint: rgba(150,125,90,.12);
  --pane: rgba(40,36,31,.70);
  --reader-bg: rgba(32,29,25,.86);

  --sep: rgba(255,248,235,.09);
  --sep-strong: rgba(255,248,235,.15);
  --hover: rgba(255,248,235,.06);
  --hover-2: rgba(255,248,235,.10);
  --sel: rgba(224,173,85,.16);
  --sel-strong: #6f96cf;
  --control: rgba(255,248,235,.08);
  --control-stroke: rgba(255,248,235,.12);
  --seg-bg: rgba(255,248,235,.07);
  --seg-knob: rgba(120,112,98,.55);
  --field: rgba(255,248,235,.07);
  --scroll: rgba(255,248,235,.20);
  --scroll-hi: rgba(255,248,235,.33);
  --shadow-pop: 0 16px 56px -10px rgba(0,0,0,.62), 0 4px 16px -6px rgba(0,0,0,.5);
  --wallpaper:
     radial-gradient(120% 120% at 8% 4%,  oklch(0.40 0.040 65 / .85), transparent 58%),
     radial-gradient(100% 100% at 94% 14%, oklch(0.36 0.045 40 / .72), transparent 52%),
     radial-gradient(130% 120% at 70% 106%, oklch(0.34 0.040 95 / .70), transparent 60%),
     linear-gradient(155deg, oklch(0.24 0.020 62), oklch(0.15 0.015 50));
}

/* ───────────────────────── desktop + window ───────────────────────── */
body { font-family: var(--ui); color: var(--text); background: var(--wallpaper); background-attachment: fixed; }
.window {
  position: absolute; inset: 22px; border-radius: var(--r-xl);
  display: flex; overflow: hidden; background: var(--win-bg);
  box-shadow: 0 0 0 .5px var(--win-stroke), 0 36px 90px -22px rgba(0,0,0,.5), 0 10px 30px -12px rgba(0,0,0,.32);
}
@media (max-width: 1100px) { .window { inset: 0; border-radius: 0; } }

.traffic { display: flex; gap: 8px; align-items: center; height: 22px; -webkit-app-region: drag; }
.tl { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.12); }
.tl.r { background: #ff5f57; } .tl.y { background: #febc2e; } .tl.g { background: #28c840; }

.icon-btn {
  width: 30px; height: 30px; border-radius: var(--r); display: inline-flex;
  align-items: center; justify-content: center; color: var(--text-2);
  transition: background .12s, color .12s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--hover); color: var(--text); }
.icon-btn.on { background: var(--accent-soft); color: var(--accent-text); }
.icon-btn svg { width: 17px; height: 17px; }
.icon-btn.sm { width: 26px; height: 26px; } .icon-btn.sm svg { width: 15px; height: 15px; }

/* ───────────────────────── sidebar ───────────────────────── */
.sidebar {
  width: 248px; flex-shrink: 0; position: relative; display: flex; flex-direction: column;
  background: var(--glass-side); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-right: .5px solid var(--sep);
}
.sidebar::before { content:""; position:absolute; inset:0; background: var(--glass-side-tint); pointer-events:none; }
.side-top { height: 52px; display: flex; align-items: center; padding: 0 18px; position: relative; z-index: 1; }
.side-scroll { flex: 1; overflow-y: auto; padding: 2px 10px 14px; position: relative; z-index: 1; }
.side-scroll::-webkit-scrollbar { width: 9px; }
.side-section { margin-top: 14px; }
.side-label {
  font-size: 11px; font-weight: 680; letter-spacing: .04em; color: var(--text-3);
  padding: 4px 8px 5px; display: flex; align-items: center; justify-content: space-between;
}
.side-label .add-mini { opacity: 0; transition: opacity .12s; }
.side-section:hover .side-label .add-mini { opacity: 1; }
.side-item {
  display: flex; align-items: center; gap: 9px; height: 30px; padding: 0 9px; border-radius: var(--r-sm);
  font-size: 13.5px; color: var(--text); position: relative; transition: background .1s;
}
.side-item:hover { background: var(--hover); }
.side-item.sel { background: var(--amber-soft); color: var(--text); box-shadow: inset 2px 0 0 var(--amber); }
.side-item.sel .si-ico { color: var(--amber); }
.side-item .si-ico { color: var(--accent); display: inline-flex; flex-shrink: 0; }
.side-item .si-ico svg { width: 16px; height: 16px; }
.side-item .si-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.side-item .count { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.side-item.sel .count { color: var(--text-3); }
.tree-toggle { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-3); flex-shrink: 0; margin-left: -3px; transition: transform .15s; }
.tree-toggle.open { transform: rotate(90deg); }
.indent { padding-left: 22px; }
.indent-2 { padding-left: 38px; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.avatar { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; }
.avatar.round { border-radius: 50%; }
.unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* ───────────────────────── list pane ───────────────────────── */
.list-pane { width: 372px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--pane); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-right: .5px solid var(--sep); }
.list-head { padding: 11px 14px 8px; border-bottom: .5px solid var(--sep); display: flex; flex-direction: column; gap: 9px; -webkit-app-region: drag; }
.list-head .row { display: flex; align-items: center; gap: 8px; }
.list-title { font-size: 19px; font-weight: 760; letter-spacing: -.01em; flex: 1; }
.list-sub { font-size: 12px; color: var(--text-3); font-weight: 500; }
.search { display: flex; align-items: center; gap: 7px; height: 30px; padding: 0 9px; border-radius: var(--r); background: var(--field); color: var(--text-2); -webkit-app-region: no-drag; box-shadow: inset 0 0 0 .5px var(--control-stroke); }
.search svg { width: 14px; height: 14px; flex-shrink: 0; }
.search input { flex: 1; background: none; border: none; outline: none; font-size: 13px; color: var(--text); }
.search input::placeholder { color: var(--text-3); }
.seg { display: inline-flex; background: var(--seg-bg); border-radius: 7px; padding: 2px; gap: 2px; }
.seg button { padding: 3px 9px; border-radius: 5px; font-size: 12px; font-weight: 560; color: var(--text-2); display: inline-flex; align-items: center; gap: 5px; }
.seg button.on { background: var(--seg-knob); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.18), 0 0 0 .5px rgba(0,0,0,.04); }
.seg.icons button { padding: 4px 7px; }
.seg.icons svg { width: 14px; height: 14px; }

.list-scroll { flex: 1; overflow-y: auto; padding: 6px; }
.card { display: flex; flex-direction: column; gap: 6px; padding: 11px 11px 12px; border-radius: var(--r-lg); position: relative; transition: background .1s; cursor: default; }
.card:hover { background: var(--hover); }
.card.sel { background: var(--amber-soft); }
.card.sel::after { content:""; position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:3px; background: var(--amber); }
.card-top { display: flex; align-items: center; gap: 7px; }
.card-src { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
.card-src .src-name { font-size: 12px; font-weight: 600; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-time { font-size: 11.5px; color: var(--text-3); font-variant-numeric: tabular-nums; white-space: nowrap; }
.card-body { display: flex; gap: 11px; }
.card-main { flex: 1; min-width: 0; }
.card-title { font-size: 14.5px; font-weight: 650; line-height: 1.34; letter-spacing: -.003em; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card.read .card-title { color: var(--text-2); font-weight: 580; }
.card-excerpt { font-size: 12.5px; line-height: 1.5; color: var(--text-3); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-thumb { width: 62px; height: 62px; border-radius: 9px; flex-shrink: 0; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.12); position: relative; overflow: hidden; }
.card-thumb .play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.card-thumb .play svg { width: 22px; height: 22px; color: #fff; filter: drop-shadow(0 1px 3px rgba(0,0,0,.4)); }
.card-thumb .dur { position:absolute; right:4px; bottom:4px; background: rgba(0,0,0,.7); color:#fff; font-size:10px; font-weight:600; padding:1px 4px; border-radius:4px; font-variant-numeric: tabular-nums; }
.card-foot { display: flex; align-items: center; gap: 6px; }
.chip { font-size: 11px; font-weight: 560; padding: 2px 8px; border-radius: 20px; background: var(--control); color: var(--text-2); display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
.chip .tdot { width: 6px; height: 6px; border-radius: 50%; }
.card-meta { font-size: 11.5px; color: var(--text-3); display: inline-flex; align-items: center; gap: 4px; }
.card .fav { color: var(--star); display: inline-flex; }
.card .fav svg { width: 13px; height: 13px; }
.mini-progress { height: 3px; border-radius: 3px; background: var(--sep-strong); overflow: hidden; margin-top: 2px; }
.mini-progress > i { display: block; height: 100%; background: var(--amber); border-radius: 3px; }
.list-empty { padding: 60px 24px; text-align: center; color: var(--text-3); font-size: 13px; }

/* ───────────────────────── reader ───────────────────────── */
.reader { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--reader-bg); position: relative; }
.reader-bar { height: 52px; display: flex; align-items: center; gap: 4px; padding: 0 10px 0 14px; border-bottom: .5px solid var(--sep); position: relative; z-index: 5; -webkit-app-region: drag; }
.reader-bar .spacer { flex: 1; }
.reader-bar .crumbs { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-3); -webkit-app-region: no-drag; min-width: 0; }
.reader-bar .crumbs b { color: var(--text-2); font-weight: 600; }
.reader-bar .icon-btn { -webkit-app-region: no-drag; }
.rprogress { position: absolute; top: 0; left: 0; height: 2.5px; background: linear-gradient(90deg, var(--amber), #ecc987); z-index: 8; transition: width .1s linear; }
.reader-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.article {
  --reading-size: 18px; --reading-lh: 1.78; --reading-width: 680px;
  max-width: var(--reading-width); margin: 0 auto; padding: 46px 40px 140px;
}
.art-cover { height: 240px; border-radius: var(--r-lg); margin-bottom: 30px; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.1); position: relative; overflow: hidden; }
.art-kicker { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--accent-text); margin-bottom: 14px; }
.art-kicker .k-sep { color: var(--text-4); }
.art-kicker .k-plain { color: var(--text-3); font-weight: 500; }
.art-title { font-size: 33px; line-height: 1.18; font-weight: 780; letter-spacing: -.02em; color: var(--text); text-wrap: balance; }
.article.serif .art-title { font-family: var(--serif); font-weight: 720; letter-spacing: 0; }
.art-meta { display: flex; align-items: center; gap: 12px; margin: 18px 0 8px; font-size: 13px; color: var(--text-2); flex-wrap: wrap; }
.art-meta .who { display: flex; align-items: center; gap: 8px; }
.art-meta .m-dot { color: var(--text-4); }
.art-toolbar { display: flex; align-items: center; gap: 6px; padding: 12px 0 4px; margin-bottom: 18px; border-bottom: .5px solid var(--sep); }
.art-toolbar .tg { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 11px; border-radius: var(--r); font-size: 12.5px; font-weight: 560; color: var(--text-2); background: var(--control); box-shadow: inset 0 0 0 .5px var(--control-stroke); transition: .12s; }
.art-toolbar .tg:hover { color: var(--text); }
.art-toolbar .tg.on { background: var(--accent-soft); color: var(--accent-text); box-shadow: inset 0 0 0 .5px transparent; }
.art-toolbar .tg svg { width: 15px; height: 15px; }
.art-toolbar .sp { flex: 1; }

.art-body { font-size: var(--reading-size); line-height: var(--reading-lh); color: var(--text); }
.art-body[lang="zh"], .art-body .zh { line-height: calc(var(--reading-lh) + .06); }
.article.serif .art-body { font-family: var(--serif); }
.art-body p { margin: 0 0 1.15em; text-wrap: pretty; }
.art-body h2 { font-size: 1.34em; font-weight: 720; letter-spacing: -.01em; margin: 1.7em 0 .6em; line-height: 1.3; }
.article.serif .art-body h2 { font-family: var(--serif); }
.art-body blockquote { margin: 1.5em 0; padding: 2px 0 2px 20px; border-left: 3px solid var(--accent); color: var(--text-2); font-style: italic; }
.article.serif .art-body blockquote { font-family: var(--serif); }
.art-body .lead { font-size: 1.08em; color: var(--text-2); }
.art-body mark.hl { background: var(--hl); color: inherit; border-radius: 3px; padding: .04em .08em; box-shadow: 0 0 0 1px var(--hl-edge); cursor: pointer; transition: background .12s; }
.art-body mark.hl:hover { filter: brightness(.96); }
.art-body mark.hl.note::after { content: "✦"; font-size: .6em; color: var(--accent-text); vertical-align: super; margin-left: 1px; }
.trans { margin: -.55em 0 1.2em; padding-left: 13px; border-left: 2px solid var(--accent-soft); color: var(--text-2); font-size: .94em; line-height: 1.7; }
.trans .tlabel { font-size: 10.5px; font-weight: 680; letter-spacing: .05em; color: var(--accent-text); text-transform: uppercase; display: block; margin-bottom: 3px; opacity: .8; }
.article:not(.bilingual) .trans { display: none; }
.art-img { height: 220px; border-radius: var(--r); margin: 1.6em 0 .6em; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.1); }
.art-cap { font-size: 12.5px; color: var(--text-3); text-align: center; margin-bottom: 1.6em; }
.art-end { margin-top: 40px; padding-top: 22px; border-top: .5px solid var(--sep); display: flex; align-items: center; gap: 10px; color: var(--text-3); font-size: 12.5px; }

/* attachment / pdf / video reader bodies */
.att-wrap { max-width: 720px; margin: 0 auto; padding: 40px; }
.att-hero { border-radius: var(--r-lg); overflow: hidden; box-shadow: 0 10px 30px -10px rgba(0,0,0,.3), inset 0 0 0 .5px rgba(0,0,0,.1); position: relative; }
.att-hero.video { aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
.att-hero .vplay { width: 64px; height: 64px; border-radius: 50%; background: rgba(0,0,0,.55); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
.att-hero .vplay svg { width: 26px; height: 26px; color: #fff; margin-left: 3px; }
.pdf-page { background: #fff; color: #1a1a1a; aspect-ratio: 1/1.3; border-radius: 6px; padding: 38px 40px; box-shadow: 0 10px 30px -12px rgba(0,0,0,.4); font-family: var(--serif); }
.pdf-page h3 { font-size: 20px; margin-bottom: 14px; }
.pdf-page p { font-size: 13px; line-height: 1.7; color: #333; margin-bottom: 10px; }

/* ───────────────────────── typography popover ───────────────────────── */
.pop { position: absolute; background: var(--win-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--r-lg); box-shadow: var(--shadow-pop), 0 0 0 .5px var(--sep-strong); z-index: 60; overflow: hidden; }
.typo-pop { width: 280px; padding: 14px; top: 50px; right: 12px; }
.typo-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 2px; }
.typo-row + .typo-row { border-top: .5px solid var(--sep); }
.typo-row .lab { font-size: 13px; color: var(--text); font-weight: 520; }
.typo-aa { display: flex; align-items: baseline; gap: 4px; }
.stepper { display: inline-flex; align-items: center; background: var(--seg-bg); border-radius: 7px; }
.stepper button { width: 30px; height: 26px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-2); }
.stepper button:hover { color: var(--text); }
.stepper .v { width: 40px; text-align: center; font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; border-left: .5px solid var(--sep); border-right: .5px solid var(--sep); height: 18px; line-height: 18px; }
.swatches { display: flex; gap: 8px; }
.swatch { width: 26px; height: 26px; border-radius: 7px; box-shadow: inset 0 0 0 .5px var(--control-stroke); position: relative; }
.swatch.on { box-shadow: inset 0 0 0 2px var(--accent); }

/* ───────────────────────── AI panel ───────────────────────── */
.ai { width: 372px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--pane); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-left: .5px solid var(--sep); }
.ai-head { height: 52px; display: flex; align-items: center; gap: 8px; padding: 0 8px 0 16px; border-bottom: .5px solid var(--sep); }
.ai-head .t { flex: 1; font-size: 14px; font-weight: 680; display: flex; align-items: center; gap: 7px; }

.ai-key .n { width: 18px; height: 18px; border-radius: 6px; background: var(--accent-soft); color: var(--accent-text); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.ai-tags { display: flex; flex-wrap: wrap; gap: 6px; }

.ai-msgs { display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 9px; max-width: 100%; }

.msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.user .ava { background: var(--sep-strong); color: var(--text-2); }
.msg.bot .ava { background: linear-gradient(135deg, #6f8fce, #b08fcf); color: #fff; }
.msg .bubble p { margin-bottom: 8px; } .msg .bubble p:last-child { margin-bottom: 0; }
.msg .cite { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent-text); background: var(--accent-soft); padding: 1px 7px; border-radius: 12px; margin: 2px 4px 0 0; }
.typing { display: inline-flex; gap: 4px; padding: 11px 13px; }

@keyframes blink { 0%,60%,100%{ opacity:.25; transform: translateY(0);} 30%{ opacity:1; transform: translateY(-3px);} }

.ai-suggest { display: flex; flex-wrap: wrap; gap: 7px; padding: 0 14px 10px; }
.ai-suggest button { font-size: 12px; padding: 6px 11px; border-radius: 16px; background: var(--field); color: var(--text-2); box-shadow: inset 0 0 0 .5px var(--control-stroke); transition: .12s; }

.ai-inputwrap { display: flex; align-items: flex-end; gap: 8px; background: var(--field); border-radius: var(--r-lg); padding: 7px 7px 7px 13px; box-shadow: inset 0 0 0 .5px var(--control-stroke); }

.send-btn { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: .12s; }
.send-btn:disabled { opacity: .4; }
.send-btn svg { width: 16px; height: 16px; }

/* remix */
.remix-card { padding: 13px; border-radius: var(--r-lg); background: var(--field); box-shadow: inset 0 0 0 .5px var(--control-stroke); }
.remix-opt { display: flex; align-items: center; gap: 10px; padding: 10px 11px; border-radius: var(--r); transition: .1s; }

.remix-opt .ico { width: 32px; height: 32px; border-radius: 9px; background: var(--accent-soft); color: var(--accent-text); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

.remix-opt .tt { font-size: 13.5px; font-weight: 600; }
.remix-opt .dd { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.src-pills { display: flex; flex-wrap: wrap; gap: 6px; }

/* ───────────────────────── command palette ───────────────────────── */
.scrim { position: absolute; inset: 0; z-index: 90; background: rgba(0,0,0,.18); backdrop-filter: blur(2px); display: flex; }
[data-theme="dark"] .scrim { background: rgba(0,0,0,.4); }
.palette { width: 620px; max-width: calc(100% - 48px); margin: 88px auto auto; align-self: flex-start; background: var(--win-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--r-xl); box-shadow: var(--shadow-pop), 0 0 0 .5px var(--sep-strong); overflow: hidden; animation: pop .14s ease; }
@keyframes pop { from { opacity: 0; transform: translateY(-8px) scale(.985); } }
.palette-input { display: flex; align-items: center; gap: 11px; padding: 16px 18px; border-bottom: .5px solid var(--sep); }
.palette-input svg { width: 19px; height: 19px; color: var(--text-3); }
.palette-input input { flex: 1; background: none; border: none; outline: none; font-size: 17px; color: var(--text); }
.palette-input input::placeholder { color: var(--text-3); }
.palette-scroll { max-height: 380px; overflow-y: auto; padding: 8px; }
.palette-grouplabel { font-size: 11px; font-weight: 680; color: var(--text-3); padding: 8px 10px 5px; letter-spacing: .03em; }
.palette-item { display: flex; align-items: center; gap: 12px; padding: 9px 11px; border-radius: var(--r); }
.palette-item.active { background: var(--accent); color: #fff; }
.palette-item.active .pi-ico, .palette-item.active .pi-sub, .palette-item.active .kbd { color: rgba(255,255,255,.85); border-color: rgba(255,255,255,.4); }
.pi-ico { color: var(--accent-text); display: inline-flex; flex-shrink: 0; width: 20px; }
.palette-item.active .pi-ico { color: #fff; }
.pi-main { flex: 1; min-width: 0; }
.pi-title { font-size: 14px; font-weight: 560; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pi-sub { font-size: 12px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.kbd { font-size: 11px; font-weight: 600; color: var(--text-3); padding: 2px 6px; border-radius: 5px; box-shadow: inset 0 0 0 1px var(--sep-strong); font-family: var(--ui); }
.palette-foot { display: flex; align-items: center; gap: 16px; padding: 9px 16px; border-top: .5px solid var(--sep); font-size: 11.5px; color: var(--text-3); }
.palette-foot .k { display: inline-flex; align-items: center; gap: 5px; }

/* ───────────────────────── modal (capture / subscriptions) ───────────────────────── */
.modal { width: 600px; max-width: calc(100% - 48px); margin: auto; background: var(--win-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--r-xl); box-shadow: var(--shadow-pop), 0 0 0 .5px var(--sep-strong); overflow: hidden; animation: pop .16s ease; max-height: calc(100% - 64px); display: flex; flex-direction: column; }
.modal.wide { width: 680px; }
.modal-head { display: flex; align-items: center; gap: 10px; padding: 15px 16px 14px; border-bottom: .5px solid var(--sep); }
.modal-head .mt { font-size: 15px; font-weight: 700; flex: 1; }
.modal-tabs { display: flex; gap: 3px; padding: 10px 14px 0; }
.modal-tab { padding: 8px 13px; border-radius: 9px 9px 0 0; font-size: 13px; font-weight: 580; color: var(--text-2); display: inline-flex; align-items: center; gap: 7px; transition: .1s; position: relative; }
.modal-tab:hover { color: var(--text); }
.modal-tab.on { color: var(--accent-text); }
.modal-tab.on::after { content:""; position:absolute; left:10px; right:10px; bottom:-1px; height:2px; background: var(--accent); border-radius: 2px; }
.modal-tab svg { width: 15px; height: 15px; }
.modal-body { padding: 18px; overflow-y: auto; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.field .inp, .field textarea, .field .url-inp { width: 100%; background: var(--field); border-radius: var(--r); padding: 10px 12px; font-size: 14px; outline: none; box-shadow: inset 0 0 0 .5px var(--control-stroke); }
.field .inp:focus, .field textarea:focus, .url-inp:focus-within { box-shadow: inset 0 0 0 1.5px var(--accent); }
.field textarea { resize: vertical; min-height: 130px; line-height: 1.6; font-family: var(--mono); font-size: 13px; }
.url-inp { display: flex; align-items: center; gap: 9px; }
.url-inp svg { width: 16px; height: 16px; color: var(--text-3); flex-shrink: 0; }
.url-inp input { flex: 1; background: none; border: none; outline: none; font-size: 14px; }
.url-inp .go { font-size: 12px; font-weight: 600; color: var(--accent-text); padding: 4px 10px; border-radius: 7px; background: var(--accent-soft); }
.fetched { display: flex; gap: 13px; padding: 13px; border-radius: var(--r-lg); background: var(--field); box-shadow: inset 0 0 0 .5px var(--control-stroke); margin-bottom: 14px; animation: pop .2s ease; }
.fetched .th { width: 96px; height: 72px; border-radius: 8px; flex-shrink: 0; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.1); }
.fetched .ft { font-size: 14px; font-weight: 650; line-height: 1.35; }
.fetched .fm { font-size: 12px; color: var(--text-3); margin-top: 5px; }
.fetched .fx { font-size: 12.5px; color: var(--text-2); margin-top: 7px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.drop { border: 1.5px dashed var(--sep-strong); border-radius: var(--r-lg); padding: 38px 20px; text-align: center; color: var(--text-3); transition: .15s; }
.drop:hover { border-color: var(--accent); color: var(--accent-text); background: var(--accent-soft); }
.drop .di { width: 40px; height: 40px; margin: 0 auto 12px; color: var(--text-3); }
.drop .dt { font-size: 14px; font-weight: 600; color: var(--text-2); }
.drop .ds { font-size: 12.5px; margin-top: 4px; }
.chips-row { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
.modal-foot { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-top: .5px solid var(--sep); }
.modal-foot .sp { flex: 1; }
.btn { padding: 8px 16px; border-radius: var(--r); font-size: 13px; font-weight: 600; transition: .12s; }
.btn.primary { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(10,108,255,.4); }
.btn.primary:hover { filter: brightness(1.06); }
.btn.ghost { background: var(--control); color: var(--text); box-shadow: inset 0 0 0 .5px var(--control-stroke); }
.btn.ghost:hover { background: var(--hover-2); }

/* subscriptions manager */
.sub-row { display: flex; align-items: center; gap: 12px; padding: 12px 6px; border-bottom: .5px solid var(--sep); }
.sub-row .meta { flex: 1; min-width: 0; }
.sub-row .nm { font-size: 14px; font-weight: 600; }
.sub-row .url { font-size: 12px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sub-row .freq { font-size: 12px; color: var(--text-2); }
.toggle { width: 38px; height: 23px; border-radius: 20px; background: var(--sep-strong); position: relative; transition: background .15s; flex-shrink: 0; }
.toggle.on { background: #34c759; }
.toggle i { position: absolute; top: 2px; left: 2px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.3); transition: transform .15s; }
.toggle.on i { transform: translateX(15px); }

/* ───────────────────────── selection popover ───────────────────────── */
.selpop { position: absolute; z-index: 70; transform: translate(-50%, -100%); display: flex; align-items: center; gap: 1px; padding: 4px; background: #1c1c20; border-radius: 11px; box-shadow: 0 10px 30px -6px rgba(0,0,0,.5), 0 0 0 .5px rgba(255,255,255,.08); animation: pop .12s ease; }
.selpop::after { content:""; position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1c1c20; border-bottom: 0; }
.selpop button { display: inline-flex; align-items: center; gap: 5px; padding: 6px 9px; border-radius: 7px; color: rgba(255,255,255,.82); font-size: 12.5px; font-weight: 540; transition: .1s; }
.selpop button:hover { background: rgba(255,255,255,.14); color: #fff; }
.selpop button.hl-act:hover { background: var(--hl); color: #1c1c20; }
.selpop button svg { width: 14px; height: 14px; }
.selpop .vr { width: .5px; height: 18px; background: rgba(255,255,255,.18); margin: 0 2px; }

/* notes drawer */
.notes-pop { width: 320px; padding: 14px; }
.notes-pop textarea { width: 100%; background: var(--field); border-radius: var(--r); padding: 9px 11px; min-height: 80px; outline: none; font-size: 13px; line-height: 1.5; box-shadow: inset 0 0 0 .5px var(--control-stroke); resize: vertical; }
.quote-pre { font-size: 12.5px; line-height: 1.5; color: var(--text-2); padding-left: 11px; border-left: 3px solid var(--hl-edge); margin-bottom: 11px; }

/* misc */
.divider { height: .5px; background: var(--sep); margin: 4px 0; }
.fade-in { animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; } }
.toast { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 95; background: #1c1c20; color: #fff; font-size: 13px; font-weight: 520; padding: 10px 16px; border-radius: 12px; box-shadow: 0 12px 36px -8px rgba(0,0,0,.5); display: flex; align-items: center; gap: 9px; animation: pop .18s ease; }
.toast svg { width: 16px; height: 16px; color: #34c759; }
.empty-reader { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-3); gap: 14px; }
.empty-reader svg { width: 46px; height: 46px; opacity: .4; }
